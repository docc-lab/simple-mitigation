# Stage 3 PHASED sweep — extrinsic bursty, SEVERE (SN 5400 / SS 6300, Poisson)
#
# Timeline (single 140 s run):
#   p1  0-20 s   victim only @ 2400 rps (baseline)
#   p2 20-80 s   contention, mitigation DISARMED (controller senses + traces)
#   p3 80-140 s  same contention, mitigation ARMED (orchestrator touches the
#                arm file at t=+80 s; see run-phased-stage3.sh)
#
# Run via the phase orchestrator, not stage3-eval.sh directly.

experiment:
  name: phased-ext-bursty-severe
  duration_s: 140
  warmup_s: 30
  cooldown_s: 30
  runs: 1
  target_node: node-4
testbeds:
  hotelReservation:
    loadgen: {rps: 2400, shape: exp}   # victim load -- fixed across all phases
  socialNetwork:
    loadgen: {rps: 5400, shape: exp, start_offset_s: 20}
    replicas: 2
  sockshop:
    loadgen: {rps: 6300, shape: exp, start_offset_s: 20}
    replicas: 2
victim:
  testbed: hotelReservation
  service: search
  image: docclabgroup/search-online:v2.3.0
  score_log: true
aggressors:
  # SN/SS co-tenants only. The HR services (profile/geo) are NOT listed:
  # they receive the victim's own e2e traffic from t0 (same frontend), so
  # pinning/labeling them as aggressors would let mitigation throttle
  # traffic that is part of the victim workload.
  - {testbed: socialNetwork, service: compose-post,  role: bad}
  - {testbed: socialNetwork, service: post-storage,  role: bad}
  - {testbed: socialNetwork, service: social-graph,  role: bad}
  - {testbed: socialNetwork, service: user-timeline, role: bad}
  - {testbed: sockshop, service: cart,      role: bad}
  - {testbed: sockshop, service: catalogue, role: bad}
  - {testbed: sockshop, service: order,     role: bad}

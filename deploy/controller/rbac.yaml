apiVersion: v1
kind: ServiceAccount
metadata:
  name: mitigation-controller
  namespace: mitigation-system
---
# Cluster-scoped because configured targets may live in any namespace and
# the isolate actuator lists aggressors anywhere on the node.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mitigation-controller
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # In-place pod resize (K8s >= 1.33 beta / >= 1.35 GA).
  - apiGroups: [""]
    resources: ["pods/resize"]
    verbs: ["patch", "update"]
  # Horizontal scale of victim Deployments.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
  # Audit trail.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mitigation-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mitigation-controller
subjects:
  - kind: ServiceAccount
    name: mitigation-controller
    namespace: mitigation-system

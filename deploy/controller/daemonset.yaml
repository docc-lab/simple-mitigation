# The mitigation-controller DaemonSet runs one pod per node. Each instance
# only ever observes/mutates workloads on its own node (NODE_NAME field
# selector), so coordination between instances is K8s-native (idempotent
# /scale + cooldown annotation on the Deployment) -- no leader election.
#
# Privileged + hostPID + host /sys/fs/cgroup is required for the isolate
# actuator's cgroup v2 cpu.max write. Same blast radius as kubelet; the
# namespace's Pod Security label restricts other workloads here to
# baseline.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mitigation-controller
  namespace: mitigation-system
  labels:
    app.kubernetes.io/name: mitigation-controller
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mitigation-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mitigation-controller
    spec:
      serviceAccountName: mitigation-controller
      hostPID: true
      # Land on every node, including control-plane and tainted nodes.
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
      containers:
        - name: mitigation-controller
          image: REGISTRY/simple-mitigation/mitigation-controller:dev
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: TARGETS_CONFIG
              value: "/etc/mitigation/targets.yaml"
            - name: POLICY_CONFIG
              value: "/etc/mitigation/policy.yaml"
            - name: TICK_MS
              value: "100"
            - name: STALE_MS
              value: "1500"
            - name: WINDOW_SIZE
              value: "20"
            - name: HI_THRESHOLD
              value: "0.5"
            - name: MIN_CPU
              value: "200m"
            - name: MAX_CPU
              value: "4"
            - name: HORIZONTAL_COOLDOWN_SEC
              value: "30"
          volumeMounts:
            - name: config
              mountPath: /etc/mitigation/targets.yaml
              subPath: targets.yaml
              readOnly: true
            - name: config
              mountPath: /etc/mitigation/policy.yaml
              subPath: policy.yaml
              readOnly: true
            # Host cgroup v2 hierarchy -- isolate writes cpu.max here.
            - name: host-cgroup
              mountPath: /sys/fs/cgroup
            # Per-pod kubelet metadata -- cgroup path resolution walks this tree.
            - name: host-kubelet-pods
              mountPath: /var/lib/kubelet/pods
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: config
          configMap:
            name: mitigation-controller-config
        - name: host-cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
        - name: host-kubelet-pods
          hostPath:
            path: /var/lib/kubelet/pods
            type: Directory

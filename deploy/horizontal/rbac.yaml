# The CPA operator (custom-pod-autoscaler-operator) provisions the CPA pod
# from a CustomPodAutoscaler CR. Each CPA needs RBAC to:
#   - scale the target Deployment (apps/deployments and apps/deployments/scale)
#   - list/watch the target Deployment's pods (so our sidecar can discover
#     pod IPs for the score gRPC streams)
#
# These Roles are namespace-scoped (hotelres in the sample). One Role + one
# RoleBinding per namespace where victim services live.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: horizontal-cpa
  namespace: hotelres
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: horizontal-cpa
  namespace: hotelres
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: horizontal-cpa
  namespace: hotelres
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: horizontal-cpa
subjects:
  - kind: ServiceAccount
    name: horizontal-cpa
    namespace: hotelres

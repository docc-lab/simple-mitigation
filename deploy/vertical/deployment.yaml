apiVersion: apps/v1
kind: Deployment
metadata:
  name: vertical-scaler
  namespace: mitigation-system
  labels:
    app.kubernetes.io/name: vertical-scaler
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vertical-scaler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vertical-scaler
    spec:
      serviceAccountName: vertical-scaler
      containers:
        - name: vertical-scaler
          image: REGISTRY/simple-mitigation/vertical-scaler:dev
          imagePullPolicy: IfNotPresent
          env:
            # All values below are the in-binary defaults; listed here for
            # operator visibility. Override per deployment as needed.
            - name: HI
              value: "0.5"
            - name: LO
              value: "0.2"
            - name: MIN_HOLD_WINDOWS
              value: "5"
            - name: COOLDOWN_SEC
              value: "60"
            - name: MIN_CPU
              value: "200m"
            - name: MAX_CPU
              value: "4"
            - name: SCALE_UP_FACTOR
              value: "1.5"
            - name: SCALE_DOWN_FACTOR
              value: "0.75"
            - name: STALE_MS
              value: "1500"
            - name: DOWNSCALE_BLOCK_TAIL
              value: "0.5"
            - name: INFEASIBLE_BACKOFF_SEC
              value: "60"
            - name: TARGETS_CONFIG
              value: "/etc/mitigation/targets.yaml"
            - name: TICK_MS
              value: "100"
          volumeMounts:
            - name: targets
              mountPath: /etc/mitigation
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: targets
          configMap:
            name: vertical-scaler-targets

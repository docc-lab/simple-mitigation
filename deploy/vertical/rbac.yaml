apiVersion: v1
kind: Namespace
metadata:
  name: mitigation-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vertical-scaler
  namespace: mitigation-system
---
# Cluster-scoped because configured targets may live in any namespace.
# pods/resize is a subresource introduced in K8s 1.33 (beta) / 1.35 (GA).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vertical-scaler
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/resize"]
    verbs: ["patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vertical-scaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vertical-scaler
subjects:
  - kind: ServiceAccount
    name: vertical-scaler
    namespace: mitigation-system
